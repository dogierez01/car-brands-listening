<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deniz's Listening Challenge</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --correct: #22c55e;
            --wrong: #ef4444;
            --border: #e2e8f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 24px;
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 24px;
            color: var(--primary-dark);
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .car-btn {
            width: 100%;
            padding: 20px;
            margin-bottom: 16px;
            border: 2px solid var(--primary);
            border-radius: 16px;
            background: #f0f9ff;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
        }

        .car-btn:active {
            transform: scale(0.98);
        }

        .audio-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            background: var(--card);
            padding: 10px 0;
            border-bottom: 2px solid var(--border);
            z-index: 10;
        }

        .audio-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .play-btn { background: var(--correct); }
        .stop-btn { background: var(--wrong); }

        .question-block {
            margin-bottom: 32px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .option-btn {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn.selected-correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
            font-weight: bold;
        }

        .option-btn.selected-wrong {
            background: var(--wrong);
            color: white;
            border-color: var(--wrong);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 30px 20px;
            background: #f0fdf4;
            border: 2px solid var(--correct);
            border-radius: 16px;
            margin-top: 30px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .results-container h2 {
            margin-top: 0;
            color: #166534;
        }

        .stat-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 18px;
        }

        .percentage-circle {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-dark);
            margin: 15px 0;
        }

        .menu-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="home-screen" class="screen active">
        <h1>Deniz's Listening Challenge</h1>
        <p style="text-align: center; margin-bottom: 24px; color: #64748b; font-size: 16px;">Select a car brand, listen carefully, and beat the quiz!</p>
        <div id="car-list"></div>
    </div>

    <div id="quiz-screen" class="screen">
        <h1 id="quiz-title">Car Name</h1>
        
        <div class="audio-controls">
            <button class="audio-btn play-btn" onclick="playAudio()">▶️ Play Audio</button>
            <button class="audio-btn stop-btn" onclick="stopAudio()">⏹️ Stop</button>
        </div>

        <div id="questions-container"></div>

        <div id="results-section" class="results-container">
            <h2>Quiz Complete!</h2>
            <div class="percentage-circle" id="score-percentage">100%</div>
            <div class="stat-row">
                <div style="color: var(--correct); font-weight: bold;">✅ Correct: <span id="score-correct">0</span></div>
                <div style="color: var(--wrong); font-weight: bold;">❌ Incorrect: <span id="score-wrong">0</span></div>
            </div>
            <p style="font-weight: bold; color: #475569;">Total Questions: <span id="score-total">15</span></p>
        </div>

        <button class="menu-btn" onclick="goHome()">⬅ Back to Main Menu</button>
    </div>
</div>
